.app{max-width:900px;margin:0 auto;padding:0.75rem;}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}

.sync{font-size:10px;margin-left:auto;color:#6b8a72;}

.tab-row{display:flex;border-bottom:0.5px solid #2d4a33;overflow-x:auto;}
.tab-row::-webkit-scrollbar{display:none;}
.rtab{flex:0 0 auto;padding:10px 14px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;border:none;border-right:0.5px solid #2d4a33;background:#1a2e1f;color:#6b8a72;font-family:inherit;white-space:nowrap;}
.rtab:last-child{border-right:none;}
.rtab.on{background:#0f1a14;color:#f5f0e8;}
.pb{padding:12px 14px;}

select:focus{border-color:#2a7a4b;}
.btn{background:#2a7a4b;color:#f5f0e8;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost{background:transparent;border:0.5px solid #2d4a33;color:#8a9e8f;border-radius:6px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.toggle{display:flex;gap:5px;margin-top:4px;}
.topt{flex:1;padding:7px 3px;font-size:11px;text-align:center;border-radius:5px;border:0.5px solid #2d4a33;background:#0f1a14;color:#8a9e8f;cursor:pointer;}
.topt.on{background:#2a7a4b;color:#f5f0e8;border-color:#2a7a4b;}
.day-sec{margin-bottom:16px;}
.day-sec:last-child{margin-bottom:0;}
.day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-bottom:5px;border-bottom:0.5px solid #1e3824;}
.day-date{font-size:10px;color:#6b8a72;text-transform:uppercase;letter-spacing:.06em;}
.day-picker{font-size:11px;color:#8a9e8f;}
.day-picker span{color:#2a7a4b;}
.mrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:7px 0;border-bottom:0.5px solid #1e3824;}
.mrow:last-child{border-bottom:none;}
.mteams{font-size:12px;color:#f5f0e8;font-weight:500;}
.mmeta{font-size:10px;color:#6b8a72;margin-top:1px;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

// Per-match stake overrides. Any matchId not listed here uses the default $2 stake.
const STAKE_OVERRIDES = { f01:15 };
function getStake(matchId){return STAKE_OVERRIDES[matchId]??2;}

function getMatch(id){for(const d of SCHEDULE)for(const m of d.matches)if(m.id===id)return m;return null;}
function getDayForMatch(id){return SCHEDULE.find(d=>d.matches.some(m=>m.id===id));}
function getOutcome(r){if(!r)return null;if(r.winner)return r.winner;if(r.homeScore>r.awayScore)return"home";if(r.awayScore>r.homeScore)return"away";return"draw";}
function pickLabel(pick,m){if(!m)return pick;if(pick==="home")return m.home+" win";if(pick==="away")return m.away+" win";return"Draw";}

function hasKickedOff(m,dayDate){
  const match=m.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!match)return true;
  let h=parseInt(match[1]);const min=parseInt(match[2]);const pm=/PM/i.test(match[3]);
  if(pm&&h!==12)h+=12;if(!pm&&h===12)h=0;
  const now=new Date();
  const parts=new Intl.DateTimeFormat("en-CA",{timeZone:"America/Vancouver",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(now);
  const get=t=>parts.find(p=>p.type===t)?.value;
  const nd=`${get("year")}-${get("month")}-${get("day")}`;
  const nh=parseInt(get("hour")),nm=parseInt(get("minute"));
  const kd=m.time.includes("(")?new Date(new Date(dayDate+"T00:00:00").getTime()-86400000).toLocaleDateString("en-CA"):dayDate;
  if(nd>kd)return true;if(nd<kd)return false;
  return nh*60+nm>=h*60+min;
}

function calcStats(picks,results){
  let dW=0,dL=0,dNet=0,tW=0,tL=0,tNet=0,settled=0,total=0;
  const chron=[];
  for(const day of SCHEDULE){
    const dp=picks[day.date]||[];const isT=day.picker==="Thomas";
    for(const p of dp){
      const r=results[p.matchId];total++;
      if(!r)continue;
      const ok=getOutcome(r)===p.pick;settled++;
      const stake=getStake(p.matchId);
      if(isT){if(ok){tW++;tNet+=stake;}else{tL++;tNet-=stake;}}
      else{if(ok){dW++;dNet+=stake;}else{dL++;dNet-=stake;}}
      chron.push(ok?(isT?"Thomas":"David"):(isT?"David":"Thomas"));
    }
  }
  let so=null,sc=0;
  for(let i=chron.length-1;i>=0;i--){
    const w=chron[i];if(so===null){so=w;sc=1;}else if(w===so)sc++;else break;
  }
  const diff=dNet-tNet;
  return{dW,dL,dNet,tW,tL,tNet,settled,total,
    leader:diff>0?"David":diff<0?"Thomas":null,lead:Math.abs(diff),
    streakOwner:so,streakCount:sc};
}

  const fetchScores=useCallback(async()=>{
    setFetching(true);
    // Name map: ESPN names -> our app names
    const NAME_MAP={"congo dr":"dr congo","democratic republic of congo":"dr congo","cote d'ivoire":"ivory coast","côte d'ivoire":"ivory coast","türkiye":"turkiye","turkey":"turkiye","czech republic":"czechia","cape verde islands":"cape verde","korea republic":"south korea","united states":"usa","u.s.a.":"usa","bosnia and herzegovina":"bosnia","bosnia-herzegovina":"bosnia","bosnia & herzegovina":"bosnia","curaçao":"curacao"};
    const norm=s=>{const l=s.toLowerCase().trim();return NAME_MAP[l]??l;};
    try{
      const espnRes=await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200");
      if(!espnRes.ok)throw new Error(`ESPN ${espnRes.status}`);
      const espnData=await espnRes.json();
      const events=espnData?.events??[];

      // Build lookup keyed by sorted team-name pair (order-independent)
      const espnMap={};
      for(const ev of events){
        const comp=ev?.competitions?.[0];
        if(!comp)continue;
        const comps=comp.competitors??[];
        if(comps.length<2)continue;
        const homeC=comps.find(c=>c.homeAway==="home");
        const awayC=comps.find(c=>c.homeAway==="away");
        if(!homeC||!awayC)continue;
        const eh=norm(homeC.team?.displayName??homeC.team?.name??"");
        const ea=norm(awayC.team?.displayName??awayC.team?.name??"");
        const hs=parseInt(homeC.score??"0",10);
        const as2=parseInt(awayC.score??"0",10);
        // Use comp.status for clock/period - more reliable than ev.status for soccer
        const cst=comp?.status??ev?.status??{};
        const stype=cst?.type?.name??"";
        const sstate=cst?.type?.state??"";       // "pre", "in", "post"
        const sshort=(cst?.type?.shortDetail??"").toLowerCase();
        let status="upcoming";
        if(sstate==="post"||stype==="STATUS_FINAL"||stype==="STATUS_FULL_TIME")status="final";
        else if(stype==="STATUS_HALFTIME"||sshort.includes("half"))status="halftime";
        else if(sstate==="in"||stype==="STATUS_IN_PROGRESS"||stype==="STATUS_END_PERIOD")status="live";
        // displayClock is a string like "23:14" or "45:00+2" - use as display label directly
        // period: 1=first half, 2=second half
        const clock=cst?.displayClock??null;
        const period=cst?.period??null;
        const minute=(clock&&clock!=="0:00")?clock:null;
        const key=[eh,ea].sort().join("|");
        espnMap[key]={hs,as2,eh,ea,status,minute,period};
      }

      // Match against our schedule for today and earlier
      const matchesToCheck=SCHEDULE.filter(d=>d.date<=TODAY).flatMap(d=>d.matches);
      const validated={};const newLive={};let added=0;let liveCount=0;
      for(const m of matchesToCheck){
        if(KNOWN_RESULTS[m.id])continue; // hard-coded always wins
        const oh=norm(m.home);const oa=norm(m.away);
        const key=[oh,oa].sort().join("|");
        const e=espnMap[key];
        if(!e||e.status==="upcoming")continue;
        const day=getDayForMatch(m.id);
        if(day&&!hasKickedOff(m,day.date))continue;
        // Swap scores if ESPN had teams in opposite order
        let homeScore=e.hs;let awayScore=e.as2;
        if(e.eh===oa&&e.ea===oh){homeScore=e.as2;awayScore=e.hs;}
        if(e.status==="live"||e.status==="halftime"){
          newLive[m.id]={homeScore,awayScore,minute:e.minute,period:e.period,status:e.status};
          liveCount++;
        } else {
          validated[m.id]={homeScore,awayScore};
          added++;
        }
      }
      setLiveScores(newLive);
      const nr={...results,...validated,...KNOWN_RESULTS};
      setResults(nr);
      if(added>0)saveResultsToDB(nr);
      const msgs=[];
      if(added>0)msgs.push(`${added} result${added>1?"s":""} updated`);
      if(liveCount>0)msgs.push(`${liveCount} live`);
      flash(msgs.length>0?msgs.join(", "):"No new scores","ok");
    }catch(e){
      console.error("fetchScores error",e);
      flash("Fetch failed: "+e.message,"err");
    }
    finally{setFetching(false);}

          {showPicker&&<span className="day-picker">Picker: <span>{day.picker}</span></span>}
        </div>
        {day.matches.map(m=><MatchRow key={m.id} m={m} dayDate={day.date}/>)}
      </div>
    );
  }

  const TABS = ["today","upcoming","completed","pick","stakes"];

  return(
    <div className="app">
      <div className="hdr">
        <h1>World Cup 2026 Pool</h1>
        <span className="sub">David vs Thomas</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {msg.text&&<span className={msg.type==="err"?"err":"ok"} style={{fontSize:11}}>{msg.text}</span>}
          <span className={`sync${syncStr?" live":""}`}>{syncStr?"⬤ "+syncStr:"Connecting..."}</span>
          <button className="btn-ghost" onClick={exportResults} style={{padding:"5px 10px",fontSize:11}}>Export</button>
          <button className="btn" onClick={fetchScores} disabled={fetching} style={{padding:"5px 10px",fontSize:11}}>
            {fetching?<span className="spinner"></span>:"Sync Scores"}
          </button>
        </div>
      </div>

      <div className="ban">
        {[
          {label:"Winnings",value:S.leader?ns(S.lead):"$0",color:S.leader?"#2a7a4b":"#f5f0e8",sub:S.leader?S.leader+" leads":"All square",lead:!!S.leader},
          {label:"David",value:ns(S.dNet),color:nc(S.dNet),sub:`${S.dW}W ${S.dL}L`},
          {label:"Thomas",value:ns(S.tNet),color:nc(S.tNet),sub:`${S.tW}W ${S.tL}L`},
          {label:"Streak",value:S.streakCount>0?S.streakCount+"W":"--",color:S.streakCount>0?"#2a7a4b":"#f5f0e8",sub:S.streakCount>0?S.streakOwner:`${S.settled}/${S.total} done`,lead:S.streakCount>0},
        ].map(c=>(
          <div key={c.label} className="bc">
            <div className="bl">{c.label}</div>
            <div className="bv" style={{color:c.color}}>{c.value}</div>
            <div className={`bs${c.lead?" lead":""}`}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div className="panel">
        <div className="tab-row">
          {TABS.map(t=>(
            <button key={t} className={`rtab${tab===t?" on":""}`} onClick={()=>setTab(t)}>
              {t==="pick"?"Submit Pick":t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>

        <div className="pb">

          {tab==="today"&&(todayDay
            ?<><div className="today-lbl">Today's picker: <b>{todayDay.picker}</b></div><DayBlock day={todayDay} showPicker={false}/></>
            :<div className="empty">No matches today.</div>)}

          {tab==="upcoming"&&(upcomingDays.length>0
            ?upcomingDays.map(day=>(
              <div key={day.date} className="day-sec">
                <div className="day-hdr">
                  <span className="day-date">{day.day}</span>
                  <span className="day-picker">Picker: <span>{day.picker}</span></span>
                </div>
                {day.matches.map(m=>{
                  const p=(picks[day.date]||[]).find(pk=>pk.matchId===m.id);
                  return(
                    <div key={m.id} className="srow">
                      <div>
                        <div style={{fontSize:12,color:"#f5f0e8"}}>{m.home} vs {m.away}</div>
                        <div style={{fontSize:10,color:"#6b8a72",marginTop:1}}>{m.time}</div>
                        {p&&<div style={{fontSize:11,color:"#8a9e8f",marginTop:1}}>Pick: {pickLabel(p.pick,m)}</div>}
                      </div>
                      <span className="sg">{m.group==="R32"?"R32":m.group==="R16"?"R16":m.group==="QF"?"QF":m.group==="SF"?"SF":m.group==="3RD"?"3rd":m.group==="FIN"?"Final":"Grp "+m.group}</span>
                    </div>
                  );
                })}
              </div>
            ))
            :<div className="empty">No upcoming days.</div>)}

          {tab==="completed"&&(completedDays.length>0
            ?completedDays.map(d=><DayBlock key={d.date} day={d}/>)
            :<div className="empty">No completed days yet.</div>)}

          {tab==="pick"&&(
            <div>
              <div className="fr">
                <div className="fl">Picker</div>
                <select value={pf.picker} onChange={e=>setPf(f=>({...f,picker:e.target.value}))}>
                  <option>David</option><option>Thomas</option>
                </select>
              </div>
              <div className="fr">
                <div className="fl">Match day</div>
                <select value={pf.dayDate} onChange={e=>setPf(f=>({...f,dayDate:e.target.value,matchId:"",pick:""}))}>
                  {SCHEDULE.map(s=><option key={s.date} value={s.date}>{s.day}</option>)}
                </select>
              </div>
              <div className="fr">
                <div className="fl">Match</div>
                <select value={pf.matchId} onChange={e=>setPf(f=>({...f,matchId:e.target.value,pick:""}))}>
                  <option value="">Select match...</option>
                  {selMatches.map(m=><option key={m.id} value={m.id}>{m.home} vs {m.away}</option>)}
                </select>
              </div>
              {selMatch&&(
                <div className="fr">
                  <div className="fl">Pick</div>
                  <div className="toggle">
                    {[["home",selMatch.home],["draw","Draw"],["away",selMatch.away]].map(([v,l])=>(
                      <div key={v} className={`topt${pf.pick===v?" on":""}`} onClick={()=>setPf(f=>({...f,pick:v}))}>{l}</div>
                    ))}
                  </div>
                </div>
              )}
              <div className="fa">
                <button className="btn" onClick={submitPick} disabled={!pf.matchId||!pf.pick||saving}>
                  {saving?<span className="spinner"></span>:"Save pick"}
                </button>
                {msg.text&&<span className={msg.type==="err"?"err":"ok"}>{msg.text}</span>}
              </div>
              <div className="divider">
                <div className="fl">Manual sync</div>
                <div className="fa">
                  <button className="btn-ghost" onClick={loadFromDB}>Pull latest</button>
                  <span className="ok" style={{fontSize:10}}>{syncStr?"Last sync "+syncStr:""}</span>
                </div>
                <div className="note">App auto-syncs every 30 seconds. Use Sync Scores in the header to fetch latest match results.</div>
              </div>
              <div className="divider">
                <div className="fl">Enter score manually</div>
                <div className="fr" style={{marginTop:6}}>
                  <select value={sf.dayDate} onChange={e=>setSf(f=>({...f,dayDate:e.target.value,matchId:""}))}>
                    {SCHEDULE.map(s=><option key={s.date} value={s.date}>{s.day}</option>)}
                  </select>
                </div>
                <div className="fr">
                  <select value={sf.matchId} onChange={e=>setSf(f=>({...f,matchId:e.target.value}))}>
                    <option value="">Select match...</option>
                    {(SCHEDULE.find(s=>s.date===sf.dayDate)?.matches||[]).map(m=>(
                      <option key={m.id} value={m.id}>{m.home} vs {m.away}</option>
                    ))}
                  </select>
                </div>
                {sf.matchId&&(
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                    <div style={{flex:1}}>
                      <div className="fl">{getMatch(sf.matchId)?.home}</div>
                      <input type="number" min="0" max="20" value={sf.homeScore}
                        onChange={e=>setSf(f=>({...f,homeScore:e.target.value}))}
                        style={{width:"100%",background:"#0f1a14",border:"0.5px solid #2d4a33",borderRadius:6,color:"#f5f0e8",fontSize:14,padding:"7px 9px",textAlign:"center"}}/>
                    </div>
                    <div style={{color:"#6b8a72",fontSize:14,paddingTop:18}}>–</div>
                    <div style={{flex:1}}>
                      <div className="fl">{getMatch(sf.matchId)?.away}</div>
                      <input type="number" min="0" max="20" value={sf.awayScore}
                        onChange={e=>setSf(f=>({...f,awayScore:e.target.value}))}
                        style={{width:"100%",background:"#0f1a14",border:"0.5px solid #2d4a33",borderRadius:6,color:"#f5f0e8",fontSize:14,padding:"7px 9px",textAlign:"center"}}/>
                    </div>
                  </div>
                )}
                <div className="fa">
                  <button className="btn" onClick={submitScore} disabled={!sf.matchId||sf.homeScore===""||sf.awayScore===""}>Save score</button>
                </div>
                <div className="note">Use this if Sync Scores misses a result. Saves to Supabase instantly so both players see it.</div>
              </div>
            </div>
          )}

          {tab==="stakes"&&(
            <div>
              <table className="stakes-table">
                <thead>
                  <tr>
                    <th>Round</th>
                    <th>Games</th>
                    <th>Stake per game</th>
                  </tr>
                </thead>
                <tbody>
                  {STAKES.map(s=>(
                    <tr key={s.round}>
                      <td>{s.round}</td>
                      <td style={{color:"#8a9e8f"}}>{s.games}</td>
                      <td className="amt">{s.stake}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="stakes-note">
                Each day one player picks all of that day's matches. Every pick must be exactly right: a win pick only pays if that team wins outright, a draw pick only pays if the match ends level. Right pick earns the stake. Wrong pick pays the other player the same amount. Stake is a flat $2 per game throughout all rounds, except the Final, which is a one-off $15 stake.
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
